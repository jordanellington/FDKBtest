services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - ALFRESCO_BASE_URL=https://secure.covi3.com
      - PORT=3001
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "5180:5180"
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
